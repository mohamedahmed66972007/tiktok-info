kind = "web"
previewPath = "/"
title = "TikTok Inspector"
version = "1.0.0"
id = "artifacts/tiktok-inspector"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19593

[services.development]
run = "pnpm --filter @workspace/tiktok-inspector run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tiktok-inspector", "run", "build" ]
publicDir = "artifacts/tiktok-inspector/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19593"
BASE_PATH = "/"
